[tool.uv.workspace]
members = [
    "core",
    "utils",
    "config",
    "modules/discord",
    "modules/twitch",
    "web/backend",
]

[tool.uv.sources]
nexus-utils  = { workspace = true }
nexus-config = { workspace = true }
nexus-core   = { workspace = true }

[tool.ruff]
target-version = "py312"
line-length    = 100

[tool.ruff.lint]
select = ["E", "F", "I", "N", "UP", "ANN", "B", "SIM"]
ignore = ["SIM105", "ANN401"]

[tool.mypy]
python_version    = "3.12"
strict            = true
warn_return_any   = true
warn_unused_configs = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts   = "-v --tb=short"

[dependency-groups]
dev = [
    "ruff>=0.4",
    "mypy>=1.10",
    "pytest>=8.0",
]